<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="description" content="Kora es el lugar donde los proyectos encuentran un hogar permanente. Gestión de proyectos offline-first, sin servidores externos ni suscripciones." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Kora — Gestión de proyectos offline-first" />
    <meta property="og:description" content="El lugar donde los proyectos encuentran un hogar permanente. Sin servidores externos, sin suscripciones. Tu trabajo y tus datos te pertenecen." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kora — Gestión de proyectos offline-first" />
    <meta name="twitter:description" content="El lugar donde los proyectos encuentran un hogar permanente. Sin servidores externos, sin suscripciones. Tu trabajo y tus datos te pertenecen." />
    <meta name="twitter:image" content="/og-image.png" />

    <title>Kora</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1a1d23" />
    <meta name="msapplication-TileColor" content="#1a1d23" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Kora" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/mobile-icon.png" />
    <script>
      // Prevent FOUC: apply theme before first paint
      (function() {
        var theme = localStorage.getItem('kora-theme') || 'system';
        var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
