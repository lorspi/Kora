name: Build Linux Portable AppImage

on:
  workflow_dispatch:
  push:
    branches: [tauri]
  pull_request:
    branches: [tauri]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - name: Install Linux system dependencies (Tauri v2)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential \
            pkg-config

      - name: Install Tauri CLI
        run: npm install -D @tauri-apps/cli

      - name: Build Tauri app (AppImage)
        run: npx tauri build --bundles appimage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kora-Linux-x86_64-AppImage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          compression-level: 0
          if-no-files-found: error

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kora-Linux-x86_64-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          compression-level: 0
          if-no-files-found: warn
